<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cereon Browser Operator</title>
    <style>
      :root {
        --bg: #ffffff;
        --surface: #f9fafb;
        --border: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
        --primary: #5b3fe0;
        --primary-hover: #4c33c4;
        --primary-text: #ffffff;
        --danger: #ef4444;
        --danger-hover: #dc2626;
        --green: #22c55e;
        --red: #ef4444;
        --radius: 8px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --surface: #1e293b;
          --border: #334155;
          --text: #f1f5f9;
          --muted: #94a3b8;
          --primary: #7c5cff;
          --primary-hover: #9a82ff;
          --primary-text: #ffffff;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 320px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        background: var(--bg);
        color: var(--text);
        padding: 16px;
        line-height: 1.5;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .header-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        object-fit: contain;
      }

      .header-title {
        font-size: 15px;
        font-weight: 600;
        flex: 1;
      }

      .status-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        margin-bottom: 14px;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .status-dot.connected {
        background: var(--green);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--green) 30%, transparent);
      }
      .status-dot.disconnected {
        background: var(--muted);
      }

      .status-label {
        font-weight: 500;
        font-size: 13px;
      }

      .workspace-name {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
        padding-left: 16px;
      }

      .error-msg {
        font-size: 11px;
        color: var(--red);
        margin-top: 6px;
        padding-left: 16px;
        word-break: break-word;
      }

      .btn {
        display: block;
        width: 100%;
        padding: 9px 14px;
        border-radius: var(--radius);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: background 0.15s;
        text-align: center;
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--primary);
        color: var(--primary-text);
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--primary-hover);
      }

      .btn-outline {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
      }

      .btn-outline:hover:not(:disabled) {
        background: var(--surface);
        color: var(--text);
      }

      .spinner {
        display: inline-block;
        width: 13px;
        height: 13px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .footer {
        margin-top: 12px;
        font-size: 11px;
        color: var(--muted);
        text-align: center;
      }

      .footer a {
        color: var(--primary);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img
        class="header-icon"
        src="icons/icon48.png"
        alt=""
        id="headerIcon"
        onerror="this.style.display = 'none'"
      />
      <span class="header-title" id="headerTitle">Cereon Browser Operator</span>
    </div>

    <div class="status-card">
      <div class="status-row">
        <div class="status-dot disconnected" id="statusDot"></div>
        <span class="status-label" id="statusLabel">Disconnected</span>
      </div>
      <div class="workspace-name" id="workspaceName" style="display: none"></div>
      <div class="error-msg" id="errorMsg" style="display: none"></div>
    </div>

    <button class="btn btn-primary" id="connectBtn">Connect</button>
    <button class="btn btn-outline" id="disconnectBtn" style="display: none; margin-top: 8px">
      Disconnect
    </button>

    <div class="footer">
      <a href="#" id="configureLink">Configure…</a> ·
      <a href="#" id="homeLink" target="_blank">Cereon Browser Operator</a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
