<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cereon Browser Operator</title>
    <style>
      /* Cereon "Signal" brand fonts — bundled woff2 (see static/fonts/). */
      @font-face {
        font-family: "DM Sans";
        src: url("fonts/dm-sans-latin-400.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "DM Sans";
        src: url("fonts/dm-sans-latin-500.woff2") format("woff2");
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "DM Sans";
        src: url("fonts/dm-sans-latin-600.woff2") format("woff2");
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Oxanium";
        src: url("fonts/oxanium-latin-600.woff2") format("woff2");
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }

      /* Light: Signal cyan hue on icy-white surfaces. */
      :root {
        --bg: #f4fbfc;
        --surface: #ffffff;
        --border: #cfe9ec;
        --text: #042024;
        --muted: #3f6e74;
        --primary: #0f8a9c;
        --primary-hover: #0c7383;
        --primary-text: #ffffff;
        --danger: #cf2e3e;
        --danger-hover: #b22634;
        --green: #16a34a;
        --red: #cf2e3e;
        --radius: 10px;
      }

      /* Dark: the cereon.in void + icy cyan, verbatim. */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #03110f;
          --surface: #07191a;
          --border: rgba(174, 243, 251, 0.12);
          --text: #e6fbff;
          --muted: #86abb0;
          --primary: #2bcfe0;
          --primary-hover: #5cc8ff;
          --primary-text: #03120f;
          --danger: #ff5c6c;
          --danger-hover: #ff8a96;
          --green: #4ade80;
          --red: #ff5c6c;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 320px;
        font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        background: var(--bg);
        color: var(--text);
        padding: 16px;
        line-height: 1.5;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .header-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        object-fit: contain;
      }

      .header-title {
        font-family: "Oxanium", "DM Sans", -apple-system, sans-serif;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
        flex: 1;
      }

      .status-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        margin-bottom: 14px;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .status-dot.connected {
        background: var(--green);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--green) 30%, transparent);
      }
      .status-dot.disconnected {
        background: var(--muted);
      }

      .status-label {
        font-weight: 500;
        font-size: 13px;
      }

      .workspace-name {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
        padding-left: 16px;
      }

      .error-msg {
        font-size: 11px;
        color: var(--red);
        margin-top: 6px;
        padding-left: 16px;
        word-break: break-word;
      }

      .btn {
        display: block;
        width: 100%;
        padding: 9px 14px;
        border-radius: var(--radius);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: background 0.15s;
        text-align: center;
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--primary);
        color: var(--primary-text);
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--primary-hover);
      }

      .btn-outline {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
      }

      .btn-outline:hover:not(:disabled) {
        background: var(--surface);
        color: var(--text);
      }

      .spinner {
        display: inline-block;
        width: 13px;
        height: 13px;
        border: 2px solid color-mix(in srgb, currentColor 35%, transparent);
        border-top-color: currentColor;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .footer {
        margin-top: 12px;
        font-size: 11px;
        color: var(--muted);
        text-align: center;
      }

      .footer a {
        color: var(--primary);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img
        class="header-icon"
        src="icons/icon48.png"
        alt=""
        id="headerIcon"
        onerror="this.style.display = 'none'"
      />
      <span class="header-title" id="headerTitle">Cereon Browser Operator</span>
    </div>

    <div class="status-card">
      <div class="status-row">
        <div class="status-dot disconnected" id="statusDot"></div>
        <span class="status-label" id="statusLabel">Disconnected</span>
      </div>
      <div class="workspace-name" id="workspaceName" style="display: none"></div>
      <div class="error-msg" id="errorMsg" style="display: none"></div>
    </div>

    <button class="btn btn-primary" id="connectBtn">Connect</button>
    <button class="btn btn-outline" id="disconnectBtn" style="display: none; margin-top: 8px">
      Disconnect
    </button>

    <div class="footer">
      <a href="#" id="configureLink">Configure…</a> ·
      <a href="#" id="homeLink" target="_blank">Cereon Browser Operator</a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
