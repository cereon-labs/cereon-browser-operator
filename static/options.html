<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cereon Browser Operator — Settings</title>
    <style>
      /* Cereon "Signal" brand fonts — bundled woff2 (see static/fonts/). */
      @font-face {
        font-family: "DM Sans";
        src: url("fonts/dm-sans-latin-400.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "DM Sans";
        src: url("fonts/dm-sans-latin-500.woff2") format("woff2");
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "DM Sans";
        src: url("fonts/dm-sans-latin-600.woff2") format("woff2");
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Oxanium";
        src: url("fonts/oxanium-latin-600.woff2") format("woff2");
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }

      /* Light: Signal cyan hue on icy-white surfaces. */
      :root {
        --bg: #f4fbfc;
        --surface: #ffffff;
        --border: #cfe9ec;
        --text: #042024;
        --muted: #3f6e74;
        --primary: #0f8a9c;
        --primary-hover: #0c7383;
        --primary-text: #ffffff;
        --green: #16a34a;
        --red: #cf2e3e;
        --radius: 10px;
      }
      /* Dark: the cereon.in void + icy cyan, verbatim. */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #03110f;
          --surface: #07191a;
          --border: rgba(174, 243, 251, 0.12);
          --text: #e6fbff;
          --muted: #86abb0;
          --primary: #2bcfe0;
          --primary-hover: #5cc8ff;
          --primary-text: #03120f;
          --green: #4ade80;
          --red: #ff5c6c;
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          "DM Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 14px;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        padding: 32px 16px;
      }
      .wrap {
        max-width: 640px;
        margin: 0 auto;
      }
      h1 {
        font-family:
          "Oxanium",
          "DM Sans",
          -apple-system,
          sans-serif;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin-bottom: 4px;
      }
      .sub {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 24px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        margin-bottom: 16px;
      }
      .field {
        margin-bottom: 16px;
      }
      .field:last-child {
        margin-bottom: 0;
      }
      label {
        display: block;
        font-weight: 500;
        margin-bottom: 6px;
        font-size: 13px;
      }
      .hint {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }
      input,
      select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
      }
      .row {
        display: flex;
        gap: 12px;
      }
      .row > .field {
        flex: 1;
      }
      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .btn {
        padding: 9px 16px;
        border-radius: var(--radius);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border: none;
      }
      .btn-primary {
        background: var(--primary);
        color: var(--primary-text);
      }
      .btn-primary:hover {
        background: var(--primary-hover);
      }
      .btn-outline {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-outline:hover {
        background: var(--bg);
      }
      .msg {
        font-size: 13px;
        margin-left: auto;
      }
      .msg.ok {
        color: var(--green);
      }
      .msg.err {
        color: var(--red);
        white-space: pre-line;
        text-align: right;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 id="title">Cereon Browser Operator</h1>
      <p class="sub">Connect the extension to your backend. See PROTOCOL.md to implement one.</p>

      <form id="form">
        <div class="card">
          <div class="field">
            <label for="transport">Transport</label>
            <select id="transport">
              <option value="sse-http">SSE + HTTP (remote)</option>
              <option value="websocket">WebSocket (local)</option>
            </select>
          </div>
          <div class="field">
            <label for="serverUrl">Server URL</label>
            <input
              id="serverUrl"
              type="text"
              placeholder="https://your-server.example or ws://localhost:8787"
            />
            <div class="hint" id="serverHint">
              Base origin for SSE/HTTP, or full ws(s):// URL for WebSocket.
            </div>
          </div>
          <div class="field" id="targetField">
            <label for="target">Target (optional)</label>
            <input
              id="target"
              type="text"
              placeholder="opaque channel id, substituted for {target}"
            />
          </div>
        </div>

        <div class="card" id="sseCard">
          <div class="field">
            <label for="commandPath">Command path</label>
            <input id="commandPath" type="text" placeholder="/browser/events" />
          </div>
          <div class="field">
            <label for="resultPath">Result path</label>
            <input id="resultPath" type="text" placeholder="/browser/result" />
          </div>
        </div>

        <div class="card" id="tokenCard">
          <div class="field">
            <label for="token">Token</label>
            <input
              id="token"
              type="password"
              placeholder="paste the bearer token from your backend"
            />
            <div class="hint">
              Stored in extension sync storage; sent as <code>Authorization: Bearer …</code>.
            </div>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
          <button type="button" class="btn btn-outline" id="resetBtn">Reset</button>
          <span class="msg" id="msg"></span>
        </div>
      </form>
    </div>

    <script src="options.js"></script>
  </body>
</html>
