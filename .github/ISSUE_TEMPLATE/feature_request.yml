name: 💡 Feature request
description: Propose a new tool, computer action, transport, auth mode, or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Browser Operator is the **control layer** — a stable protocol plus a CDP
        engine, with pluggable backends. The cleanest additions slot into an
        existing extension point (a tool, a `computer` action, a transport, an
        auth mode). See CONTRIBUTING.md → Extending.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point — not the solution yet.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you add or change? If it's a new tool/action/transport, sketch the arguments and result shape.
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Kind of change
      options:
        - New tool
        - New `computer` action
        - New transport
        - New auth mode
        - Protocol change
        - MCP server feature
        - Docs / example
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a PR for this.
