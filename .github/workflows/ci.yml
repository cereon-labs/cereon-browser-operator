name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: format · lint · typecheck · test · build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier (format check)
        run: pnpm run format:check

      - name: ESLint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests (with coverage)
        run: pnpm run test:coverage

      - name: Build extension
        run: pnpm run build

      - name: Verify build output
        run: node scripts/verify-dist.mjs

      - name: Syntax-check Node scripts & backends
        run: |
          node --check esbuild.config.mjs
          node --check scripts/demo.mjs
          node --check scripts/verify-dist.mjs
          node --check mcp-server/server.mjs
          node --check examples/reference-server.mjs
          node --check examples/cli-driver.mjs
